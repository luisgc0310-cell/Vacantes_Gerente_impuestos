.det{font-size:13.5px;color:var(--ink);margin-top:6px}

.empty{text-align:center;color:var(--mut);padding:40px 0}

const ESTADOS = ["Todas","Abierta","Aplicada","Entrevista","Cerrada","Rechazada"];
let filtro = "Todas", q = "";
function sueldoBadge(o){
  if(/\$\s?\d/.test(o)) return '<span class="badge b-sueldo">'+(o.match(/\$[\d,]+(\s*-\s*\$[\d,]+)?/)||["$"])[0]+'</span>';
  return '<span class="badge b-sueldo-nd">Sueldo por confirmar</span>';
}
function render(){
  const counts = {};
  DATA.forEach(d=>counts[d.estatus]=(counts[d.estatus]||0)+1);
  document.getElementById("stats").innerHTML =
    '<div class="stat"><b>'+DATA.length+'</b><span>Detectadas</span></div>'+
    ["Abierta","Aplicada","Entrevista","Cerrada"].map(e=>
      '<div class="stat"><b>'+(counts[e]||0)+'</b><span>'+e+(counts[e]==1?"":"s")+'</span></div>').join("");
  document.getElementById("chips").innerHTML = ESTADOS.map(e=>
    '<span class="chip'+(filtro===e?" on":"")+'" onclick="setF(\''+e+'\')">'+e+'</span>').join(" ");
  const list = DATA.filter(d=>(filtro==="Todas"||d.estatus===filtro) &&
    (q==="" || (d.puesto+d.empresa+d.requisitos+d.ubicacion+d.notas).toLowerCase().includes(q)));
  document.getElementById("list").innerHTML = list.length ? list.map(d=>
    '<div class="card"><div class="top"><span class="puesto">'+d.puesto+'</span><span class="empresa">'+d.empresa+' · '+d.ubicacion+'</span></div>'+
    '<div class="badges"><span class="badge b-est-'+d.estatus+'">'+d.estatus+'</span>'+
    '<span class="badge b-sitio">'+d.sitio+'</span>'+sueldoBadge(d.ofrece)+
    (d.fecha?'<span class="badge b-sitio">Detectada '+d.fecha+'</span>':"")+
    (d.fecha_aplicacion?'<span class="badge b-est-Aplicada">Aplicada '+d.fecha_aplicacion+'</span>':"")+'</div>'+
    (d.requisitos?'<div class="det"><b>Requisitos:</b> '+d.requisitos+'</div>':"")+
    (d.ofrece?'<div class="det"><b>Ofrece:</b> '+d.ofrece+'</div>':"")+
    (d.notas?'<div class="notas">'+d.notas+'</div>':"")+
    (d.link&&d.link!=="None"?'<a class="link" href="'+d.link+'" target="_blank">Ver vacante →</a>':"")+
    '</div>').join("") : '<div class="empty">Sin vacantes con este filtro</div>';
}
function setF(e){filtro=e;render();}
document.getElementById("q").addEventListener("input",ev=>{q=ev.target.value.toLowerCase();render();});
render();
